<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🎨 QR Code Generator</h1>
        <p class="subtitle">Create custom QR codes for URLs, WiFi, Contacts, and more</p>
        
        <div class="main-content">
            <div class="form-section">
                <div class="input-group">
                    <label>QR Code Type</label>
                    <select id="qrType" onchange="changeQRType()">
                        <option value="url">🔗 URL / Text</option>
                        <option value="phone">📞 Phone Number</option>
                        <option value="email">📧 Email</option>
                        <option value="sms">💬 SMS</option>
                        <option value="wifi">📶 WiFi</option>
                        <option value="vcard">👤 Contact Card (vCard)</option>
                    </select>
                </div>

                <!-- URL Form -->
                <div id="urlForm" class="qr-form">
                    <div class="input-group">
                        <label>Enter URL or Text</label>
                        <input type="text" id="url" placeholder="https://example.com">
                    </div>
                </div>

                <!-- Phone Form -->
                <div id="phoneForm" class="qr-form" style="display: none;">
                    <div class="input-group">
                        <label>Phone Number</label>
                        <input type="tel" id="phoneNumber" placeholder="+1234567890">
                    </div>
                </div>

                <!-- Email Form -->
                <div id="emailForm" class="qr-form" style="display: none;">
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" id="emailAddress" placeholder="example@email.com">
                    </div>
                    <div class="input-group">
                        <label>Subject (Optional)</label>
                        <input type="text" id="emailSubject" placeholder="Email subject">
                    </div>
                    <div class="input-group">
                        <label>Message (Optional)</label>
                        <textarea id="emailBody" placeholder="Email message" rows="3"></textarea>
                    </div>
                </div>

                <!-- SMS Form -->
                <div id="smsForm" class="qr-form" style="display: none;">
                    <div class="input-group">
                        <label>Phone Number</label>
                        <input type="tel" id="smsPhone" placeholder="+1234567890">
                    </div>
                    <div class="input-group">
                        <label>Message</label>
                        <textarea id="smsMessage" placeholder="SMS message" rows="3"></textarea>
                    </div>
                </div>

                <!-- WiFi Form -->
                <div id="wifiForm" class="qr-form" style="display: none;">
                    <div class="input-group">
                        <label>WiFi Name (SSID)</label>
                        <input type="text" id="wifiSSID" placeholder="MyWiFi">
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="text" id="wifiPassword" placeholder="password123">
                    </div>
                    <div class="input-group">
                        <label>Encryption Type</label>
                        <select id="wifiEncryption">
                            <option value="WPA">WPA/WPA2</option>
                            <option value="WEP">WEP</option>
                            <option value="nopass">None</option>
                        </select>
                    </div>
                </div>

                <!-- vCard Form -->
                <div id="vcardForm" class="qr-form" style="display: none;">
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" id="vcardName" placeholder="John Doe">
                    </div>
                    <div class="input-group">
                        <label>Phone Number</label>
                        <input type="tel" id="vcardPhone" placeholder="+1234567890">
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="vcardEmail" placeholder="john@example.com">
                    </div>
                    <div class="input-group">
                        <label>Organization (Optional)</label>
                        <input type="text" id="vcardOrg" placeholder="Company Name">
                    </div>
                    <div class="input-group">
                        <label>Website (Optional)</label>
                        <input type="url" id="vcardWebsite" placeholder="https://example.com">
                    </div>
                </div>

                <div class="input-group">
                    <label>Upload Logo (Optional)</label>
                    <input type="file" id="logo" accept="image/*">
                </div>

                <div class="color-group">
                    <div class="input-group">
                        <label>QR Color</label>
                        <input type="color" id="fillColor" value="#000000">
                    </div>
                    <div class="input-group">
                        <label>Background Color</label>
                        <input type="color" id="backColor" value="#ffffff">
                    </div>
                </div>

                <div class="input-group">
                    <label>Size</label>
                    <select id="size">
                        <option value="small">Small</option>
                        <option value="medium" selected>Medium</option>
                        <option value="large">Large</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Error Correction</label>
                    <select id="errorLevel">
                        <option value="L">L - 7% recovery</option>
                        <option value="M">M - 15% recovery</option>
                        <option value="Q">Q - 25% recovery</option>
                        <option value="H" selected>H - 30% recovery (Best for logos)</option>
                    </select>
                </div>

                <button class="btn-generate" onclick="generateQR()">Generate QR Code</button>
            </div>

            <div class="preview-section">
                <h3>Preview</h3>
                <div id="preview" class="preview-box">
                    <p class="placeholder">Your QR code will appear here</p>
                </div>
                
                <div id="downloadSection" style="display: none;">
                    <div class="input-group">
                        <label>Download Format</label>
                        <select id="format">
                            <option value="png">PNG</option>
                            <option value="jpg">JPG</option>
                            <option value="webp">WEBP</option>
                            <option value="eps">EPS (Print)</option>
                        </select>
                    </div>
                    <button class="btn-download" onclick="downloadQR()">Download QR Code</button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
